apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plumb.fullname" . }}
  labels:
    {{- include "plumb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "plumb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/verifier-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "plumb.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PLUMB_CONFIG
              value: /etc/plumb/verifier.yaml
          volumeMounts:
            - name: verifier-config
              mountPath: /etc/plumb
              readOnly: true
          # startupProbe headroom covers the first-start ~420 MB weight
          # download; liveness/readiness stay tight for steady state.
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: verifier-config
          configMap:
            name: {{ include "plumb.fullname" . }}-verifier
