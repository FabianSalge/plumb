apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plumb.fullname" . }}
  labels:
    {{- include "plumb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "plumb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/verifier-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "plumb.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        # The image's USER is the name "plumb"; the kubelet can only verify
        # non-root against the numeric UID baked into the Dockerfile.
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PLUMB_CONFIG
              value: /etc/plumb/verifier.yaml
            {{- if .Values.store.enabled }}
            # Read-only tenant store (thorough mode); the DSN comes from an
            # existing Secret, never from chart values.
            - name: PLUMB_STORE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ required "store.dsnSecret is required when store.enabled" .Values.store.dsnSecret }}
                  key: {{ .Values.store.dsnSecretKey }}
            - name: PLUMB_STORE_TABLE
              value: {{ required "store.table is required when store.enabled" .Values.store.table | quote }}
            - name: PLUMB_STORE_ID_COLUMN
              value: {{ required "store.idColumn is required when store.enabled" .Values.store.idColumn | quote }}
            - name: PLUMB_STORE_TEXT_COLUMN
              value: {{ required "store.textColumn is required when store.enabled" .Values.store.textColumn | quote }}
            {{- with .Values.store.sourceColumn }}
            - name: PLUMB_STORE_SOURCE_COLUMN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.store.snapshotColumn }}
            - name: PLUMB_STORE_SNAPSHOT_COLUMN
              value: {{ . | quote }}
            {{- end }}
            - name: PLUMB_STORE_REGCONFIG
              value: {{ .Values.store.regconfig | quote }}
            {{- end }}
          volumeMounts:
            - name: verifier-config
              mountPath: /etc/plumb
              readOnly: true
          # startupProbe headroom covers the first-start weight downloads;
          # liveness/readiness stay tight for steady state.
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: verifier-config
          configMap:
            name: {{ include "plumb.fullname" . }}-verifier
            items:
              - key: verifier.yaml
                path: verifier.yaml
              # Lands the artifact at exactly the config-relative path the
              # verifier config references.
              - key: calibration.yaml
                path: {{ .Values.verifier.signals.groundedness.calibration }}
