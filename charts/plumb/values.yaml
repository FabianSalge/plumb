replicaCount: 1

image:
  repository: plumb
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 8000

# Sized from the spike's measured baseline (docs/spikes/2026-07-04-fastapi-hhem.md):
# ~610 MB RSS with HHEM loaded, CPU-bound inference. Re-derive when the
# groundedness model changes (#18).
resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    memory: 1536Mi

# Rendered into the ConfigMap the API reads via PLUMB_CONFIG. Defaults must
# stay identical to config/verifier.yaml — a render test fails on drift.
# Bump version on any change; it is echoed as config_version in every response.
verifier:
  version: "0.1.0"
  signals:
    groundedness:
      model: vectara/hallucination_evaluation_model
      revision: "8e4a2e6e96c708cc76c2344f7e4757df2515292c"
      threshold: 0.5

networkPolicy:
  enabled: true
  # The one hole in default-deny egress: TCP 443 so the pod can fetch the
  # pinned model weights at first start. Set false when weights are mirrored
  # or pre-baked in-cluster to restore deny-everything-but-DNS.
  allowModelDownload: true
