replicaCount: 1

image:
  repository: plumb
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 8000

# Sized from a measured baseline: ~1.1 GiB peak RSS with LettuceDetect v2
# loaded and serving verify-shaped requests on CPU (macOS, torch CPU wheels).
# Re-derive when the groundedness model changes (ADR-0006).
resources:
  requests:
    cpu: 500m
    memory: 1536Mi
  limits:
    memory: 2560Mi

# Rendered into the ConfigMap the API reads via PLUMB_CONFIG. Defaults must
# stay identical to config/verifier.yaml — a render test fails on drift.
# Bump version on any change; it is echoed as config_version in every response.
verifier:
  version: "0.2.0"
  signals:
    groundedness:
      model: KRLabsOrg/lettucedect-v2-mmbert-base
      revision: "0f85c7a15b17aee6e8f794dae7cb4e42e2b8fdac"
      threshold: 0.5

networkPolicy:
  enabled: true
  # The one hole in default-deny egress: TCP 443 so the pod can fetch the
  # pinned model weights at first start. Set false when weights are mirrored
  # or pre-baked in-cluster to restore deny-everything-but-DNS.
  allowModelDownload: true
