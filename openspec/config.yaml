schema: spec-driven

context: |
  Plumb: the open-source, self-hostable groundedness gate. A verification
  engine behind an HTTP API, deployed via Helm; CI and runtime consult the
  same engine with the same thresholds. API language is undecided until
  ADR-0001 (issue #7) — keep specs language-agnostic.
  Conventions: conventional commits (one sentence, no trailers); failing
  tests exist before implementation; every change maps to a GitHub issue
  with acceptance criteria.

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
