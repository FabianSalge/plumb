name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Classifies the PR diff so prose-only PRs (openspec/, docs/, markdown)
  # skip the heavy jobs. Skip-only by construction: the gated jobs run
  # unless this job reports an explicit 'false', so a failure here falls
  # back to the full pipeline.
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!openspec/**'
              - '!docs/**'
              - '!**/*.md'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pipx install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs: changes
    # `!cancelled()` lets this run on push, where `changes` is skipped;
    # `!= 'false'` keeps the skip opt-in rather than the run opt-in.
    if: ${{ !cancelled() && (github.event_name == 'push' || needs.changes.outputs.code != 'false') }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy
      - name: Run tests with coverage floor
        run: uv run pytest --cov

  chart:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'push' || needs.changes.outputs.code != 'false') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5.0.1
      - run: helm lint charts/plumb
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: helm/chart-testing-action@v2.8.0
      - name: Chart-testing lint
        run: ct lint --charts charts/plumb --target-branch ${{ github.event.repository.default_branch }}

  image:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'push' || needs.changes.outputs.code != 'false') }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: plumb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Fail on critical CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: plumb:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Record image size
        run: >
          docker image inspect plumb:${{ github.sha }} --format '{{.Size}}'
          | awk '{printf "image size: %.0f MB uncompressed\n", $1/1e6}'
          | tee -a "$GITHUB_STEP_SUMMARY"

  e2e:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'push' || needs.changes.outputs.code != 'false') }}
    # Budgeted at ~10 minutes (#11); the headroom covers a cold buildx cache.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: plumb:dev
          cache-from: type=gha
      - uses: helm/kind-action@v1.14.0
        with:
          install_only: true
          # Must match the kind release whose node image the Makefile pins —
          # an older CLI cannot load images into a newer node's containerd.
          version: v0.32.0
      - run: make kind-up
      # `make deploy` minus the rebuild — plumb:dev already exists from the
      # cached buildx step above.
      - name: Load image and install the chart
        run: |
          kind load docker-image plumb:dev --name plumb
          helm upgrade --install plumb charts/plumb \
            --kube-context kind-plumb --wait --timeout 8m
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Golden verify request
        run: make e2e
      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl --context kind-plumb get pods -o wide || true
          kubectl --context kind-plumb describe pods || true
          kubectl --context kind-plumb get events --sort-by=.lastTimestamp | tail -50 || true
          kubectl --context kind-plumb logs -l app.kubernetes.io/name=plumb --all-containers --tail=-1 || true
