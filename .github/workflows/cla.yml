name: cla

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check the PR author has signed the CLA
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: .github/cla/check.sh "$AUTHOR"
