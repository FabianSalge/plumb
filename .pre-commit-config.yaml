default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        # Go-templated manifests are not YAML until rendered; helm lint and
        # the CI chart job cover them. Chart.yaml/values.yaml stay linted.
        exclude: ^charts/[^/]+/templates/
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      # Two ADR branches merged the same number once (#71); the CI lint job
      # runs this against the PR merge ref, so the second of a colliding
      # pair fails before it lands.
      - id: adr-numbers-unique
        name: ADR numbers are unique
        language: system
        entry: >
          bash -c 'dups=$(ls docs/adr | grep -oE "^[0-9]{4}" | sort |
          uniq -d); [ -z "$dups" ] ||
          { echo "duplicate ADR number(s): $dups"; exit 1; }'
        files: ^docs/adr/
        pass_filenames: false
